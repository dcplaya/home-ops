---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kometa
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: kometa
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        PLEX_API_KEY: "{{ .PLEX_API_TOKEN }}"
        TAUTULLI_API_KEY: "{{ .TAUTULLI_API_KEY }}"
        TMDB_API_KEY: "{{ .TMDB_API_KEY }}"
        RADARR_API_KEY: "{{ .RADARR__AUTH__APIKEY }}"
        SONARR_API_KEY: "{{ .SABNZBD__API_KEY }}"
        TRAKT_ID: "{{ .TRAKT_ID }}"
        TRAKT_SECRET: "{{ .TRAKT_SECRET }}"
        TRAKT_ACCESS_TOKEN: "{{ .TRAKT_ACCESS_TOKEN }}"
        TRAKT_REFRESH_TOKEN: "{{ .TRAKT_REFRESH_TOKEN }}"
  dataFrom:
    - extract:
        key: kometa
    - extract:
        key: radarr
    - extract:
        key: sonarr
