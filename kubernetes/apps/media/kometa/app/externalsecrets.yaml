---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kometa
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: kometa
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        KOMETA_PLEX_API_KEY: "{{ .PLEX_API_KEY}}"
        KOMETA_TAUTULLI_API_KEY: "{{ .TAUTULLI_API_KEY }}"
        KOMETA_TMDB_API_KEY: "{{ .TMDB_API_KEY }}"
        KOMETA_RADARR_API_KEY: "{{ .RADARR__AUTH__APIKEY }}"
        KOMETA_SONARR_API_KEY: "{{ .SONARR__AUTH__APIKEY }}"
        KOMETA_TRAKT_ID: "{{ .TRAKT_ID }}"
        KOMETA_TRAKT_SECRET: "{{ .TRAKT_SECRET }}"
        KOMETA_TRAKT_ACCESS_TOKEN: "{{ .TRAKT_ACCESS_TOKEN }}"
        KOMETA_TRAKT_REFRESH_TOKEN: "{{ .TRAKT_REFRESH_TOKEN }}"
  dataFrom:
    - extract:
        key: kometa
    - extract:
        key: radarr
    - extract:
        key: sonarr
